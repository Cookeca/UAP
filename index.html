<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UAP Evidence Map</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css" />
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css" />

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300;9..144,400;9..144,500;9..144,600;9..144,700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">

<style>
  :root {
    --bg-deep: #0a0e14;
    --bg-panel: #11161f;
    --bg-elevated: #1a212c;
    --border-subtle: #232b38;
    --border-strong: #2f3a4c;
    --ink-primary: #e8e6df;
    --ink-secondary: #a8a89e;
    --ink-tertiary: #6b6e75;
    --accent-amber: #d4a85a;
    --accent-rust: #c4663a;

    /* Spectrum colors: resolved (cool gray) → disinformation (rust) → contested (amber) → testimony (light teal) → multi-sensor anomalous (electric blue) */
    --cat-resolved: #6b7a8a;
    --cat-disinfo: #b85c3a;
    --cat-contested: #d4a85a;
    --cat-testimony: #7eb8b0;
    --cat-anomalous: #5b9fd6;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    height: 100%;
    background: var(--bg-deep);
    color: var(--ink-primary);
    font-family: 'Fraunces', Georgia, serif;
    font-feature-settings: "ss01", "ss02";
    -webkit-font-smoothing: antialiased;
    overflow: hidden;
  }

  body {
    display: grid;
    grid-template-rows: auto 1fr;
    height: 100vh;
  }

  /* === HEADER === */
  header {
    background: var(--bg-panel);
    border-bottom: 1px solid var(--border-subtle);
    padding: 14px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 24px;
    flex-wrap: wrap;
    z-index: 1000;
  }

  .brand {
    display: flex;
    flex-direction: column;
    gap: 2px;
  }

  .brand h1 {
    font-family: 'Fraunces', serif;
    font-weight: 500;
    font-size: 22px;
    letter-spacing: -0.02em;
    color: var(--ink-primary);
    line-height: 1;
  }

  .brand .subtitle {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.15em;
    color: var(--ink-tertiary);
    margin-top: 4px;
  }

  .legend {
    display: flex;
    align-items: center;
    gap: 14px;
    flex-wrap: wrap;
  }

  .legend-item {
    display: flex;
    align-items: center;
    gap: 6px;
    cursor: pointer;
    padding: 4px 8px;
    border-radius: 4px;
    transition: background 0.15s;
    user-select: none;
  }

  .legend-item:hover { background: var(--bg-elevated); }
  .legend-item.disabled { opacity: 0.35; }

  .legend-dot {
    width: 11px;
    height: 11px;
    border-radius: 50%;
    border: 1.5px solid rgba(255,255,255,0.4);
  }

  .legend-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--ink-secondary);
  }

  /* === MAP === */
  #map {
    width: 100%;
    height: 100%;
    background: #0a0e14;
  }

  /* Dark tile filter */
  .leaflet-tile-pane {
    filter: invert(1) hue-rotate(180deg) brightness(0.85) saturate(0.6) contrast(0.9);
  }

  /* Custom pin styling */
  .uap-pin {
    border-radius: 50%;
    border: 2px solid rgba(255,255,255,0.65);
    box-shadow: 0 0 0 1px rgba(0,0,0,0.4), 0 2px 10px rgba(0,0,0,0.5);
    transition: transform 0.18s, box-shadow 0.18s;
    cursor: pointer;
  }

  .uap-pin.strong {
    box-shadow: 0 0 0 1px rgba(0,0,0,0.4), 0 0 18px currentColor, 0 2px 14px rgba(0,0,0,0.6);
  }

  .uap-pin:hover {
    transform: scale(1.18);
    z-index: 1000 !important;
  }

  .uap-pin.pulse::after {
    content: '';
    position: absolute;
    inset: -6px;
    border-radius: 50%;
    border: 1.5px solid currentColor;
    opacity: 0;
    animation: pulse 2.4s ease-out infinite;
  }

  @keyframes pulse {
    0% { opacity: 0.7; transform: scale(0.9); }
    100% { opacity: 0; transform: scale(1.8); }
  }

  /* Marker cluster override */
  .marker-cluster {
    background: rgba(212, 168, 90, 0.18);
    border: 1px solid rgba(212, 168, 90, 0.4);
  }
  .marker-cluster div {
    background: rgba(212, 168, 90, 0.4);
    color: var(--ink-primary);
    font-family: 'JetBrains Mono', monospace;
    font-weight: 600;
  }

  /* === MODAL === */
  .modal-backdrop {
    position: fixed;
    inset: 0;
    background: rgba(5, 8, 12, 0.75);
    backdrop-filter: blur(8px);
    z-index: 5000;
    display: none;
    align-items: center;
    justify-content: center;
    padding: 24px;
    opacity: 0;
    transition: opacity 0.2s;
  }

  .modal-backdrop.open {
    display: flex;
    opacity: 1;
  }

  .modal {
    background: var(--bg-panel);
    border: 1px solid var(--border-strong);
    border-radius: 8px;
    max-width: 640px;
    width: 100%;
    max-height: 85vh;
    overflow-y: auto;
    box-shadow: 0 24px 80px rgba(0,0,0,0.7);
    transform: translateY(10px) scale(0.98);
    transition: transform 0.25s cubic-bezier(0.2, 0.8, 0.2, 1);
  }

  .modal-backdrop.open .modal {
    transform: translateY(0) scale(1);
  }

  .modal-header {
    padding: 24px 28px 18px;
    border-bottom: 1px solid var(--border-subtle);
    position: relative;
  }

  .modal-category {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.15em;
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 4px 10px;
    border-radius: 12px;
    background: var(--bg-elevated);
    margin-bottom: 14px;
  }

  .modal-category-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
  }

  .modal-title {
    font-family: 'Fraunces', serif;
    font-weight: 500;
    font-size: 28px;
    line-height: 1.15;
    letter-spacing: -0.02em;
    color: var(--ink-primary);
  }

  .modal-meta {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--ink-tertiary);
    margin-top: 8px;
    letter-spacing: 0.05em;
  }

  .modal-close {
    position: absolute;
    top: 18px;
    right: 18px;
    width: 32px;
    height: 32px;
    border-radius: 50%;
    background: var(--bg-elevated);
    border: 1px solid var(--border-subtle);
    color: var(--ink-secondary);
    cursor: pointer;
    font-size: 16px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.15s;
  }

  .modal-close:hover {
    color: var(--ink-primary);
    background: var(--bg-deep);
  }

  .modal-body {
    padding: 22px 28px 28px;
  }

  .modal-section {
    margin-bottom: 20px;
  }

  .modal-section:last-child { margin-bottom: 0; }

  .modal-section h3 {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.15em;
    color: var(--ink-tertiary);
    margin-bottom: 8px;
    font-weight: 500;
  }

  .modal-section p {
    font-family: 'Fraunces', serif;
    font-size: 15.5px;
    line-height: 1.6;
    color: var(--ink-primary);
  }

  .modal-section.compelling p {
    color: var(--accent-amber);
    font-style: italic;
  }

  .spectrum-bar {
    height: 6px;
    background: linear-gradient(90deg, var(--cat-resolved) 0%, var(--cat-disinfo) 25%, var(--cat-contested) 50%, var(--cat-testimony) 75%, var(--cat-anomalous) 100%);
    border-radius: 3px;
    position: relative;
    margin: 6px 0 4px;
  }

  .spectrum-marker {
    position: absolute;
    top: -5px;
    width: 16px;
    height: 16px;
    border-radius: 50%;
    background: var(--ink-primary);
    border: 3px solid var(--bg-panel);
    transform: translateX(-50%);
    box-shadow: 0 0 0 1px var(--border-strong);
  }

  .spectrum-labels {
    display: flex;
    justify-content: space-between;
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.05em;
    color: var(--ink-tertiary);
    text-transform: uppercase;
    margin-top: 8px;
  }

  .sources {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .sources a {
    color: var(--cat-testimony);
    text-decoration: none;
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    padding: 6px 0;
    border-bottom: 1px solid var(--border-subtle);
    transition: color 0.15s;
    word-break: break-word;
  }

  .sources a:hover { color: var(--accent-amber); }
  .sources a:last-child { border-bottom: none; }

  /* Disclaimer footer */
  .footer-note {
    position: absolute;
    bottom: 12px;
    left: 12px;
    background: rgba(17, 22, 31, 0.85);
    backdrop-filter: blur(6px);
    border: 1px solid var(--border-subtle);
    padding: 8px 12px;
    border-radius: 4px;
    z-index: 999;
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.08em;
    color: var(--ink-tertiary);
    text-transform: uppercase;
    max-width: 280px;
    line-height: 1.5;
  }

  @media (max-width: 720px) {
    header { padding: 12px 14px; gap: 12px; }
    .brand h1 { font-size: 18px; }
    .brand .subtitle { font-size: 9px; }
    .legend { gap: 8px; }
    .legend-label { font-size: 9px; }
    .footer-note { display: none; }
    .modal { max-height: 92vh; }
    .modal-title { font-size: 22px; }
  }
</style>
</head>
<body>

<header>
  <div class="brand">
    <h1>UAP Evidence Map</h1>
    <div class="subtitle">Cases ranked by what the record actually supports</div>
  </div>

  <div class="legend" id="legend">
    <!-- populated by JS -->
  </div>
</header>

<div id="map"></div>

<div class="footer-note">
  Pin size indicates evidence strength. Click a pin for case details and sources.
</div>

<div class="modal-backdrop" id="modalBackdrop">
  <div class="modal" id="modal" role="dialog" aria-modal="true">
    <button class="modal-close" id="modalClose" aria-label="Close">×</button>
    <div class="modal-header">
      <div class="modal-category" id="modalCategory">
        <span class="modal-category-dot" id="modalCategoryDot"></span>
        <span id="modalCategoryLabel"></span>
      </div>
      <h2 class="modal-title" id="modalTitle"></h2>
      <div class="modal-meta" id="modalMeta"></div>
    </div>
    <div class="modal-body">
      <div class="modal-section">
        <h3>Summary</h3>
        <p id="modalSummary"></p>
      </div>
      <div class="modal-section compelling">
        <h3>What's compelling</h3>
        <p id="modalCompelling"></p>
      </div>
      <div class="modal-section">
        <h3>What skeptics say</h3>
        <p id="modalSkeptics"></p>
      </div>
      <div class="modal-section">
        <h3>Spectrum position</h3>
        <div class="spectrum-bar">
          <div class="spectrum-marker" id="modalSpectrumMarker"></div>
        </div>
        <div class="spectrum-labels">
          <span>Resolved mundane</span>
          <span>Documented anomalous</span>
        </div>
      </div>
      <div class="modal-section">
        <h3>Sources</h3>
        <div class="sources" id="modalSources"></div>
      </div>
    </div>
  </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>

<script>
// ============================================================
// CATEGORIES
// ============================================================
const CATEGORIES = {
  resolved: {
    label: 'Resolved as mundane',
    color: '#6b7a8a',
    position: 8
  },
  disinformation: {
    label: 'Documented disinformation',
    color: '#b85c3a',
    position: 25
  },
  contested: {
    label: 'Genuinely contested',
    color: '#d4a85a',
    position: 50
  },
  testimony: {
    label: 'Credible testimony, no physical evidence',
    color: '#7eb8b0',
    position: 70
  },
  anomalous: {
    label: 'Multi-sensor anomalous',
    color: '#5b9fd6',
    position: 90
  }
};

// ============================================================
// CASES — full evidence map data
// ============================================================
// Fields:
//   strength: 1 (weak evidence) to 5 (strongest evidence) — controls pin size
//   spectrum: 0-100 position on the resolved→anomalous axis (overrides category default if set)
// ============================================================

const CASES = [
  {
    id: 'nimitz_2004',
    title: 'Nimitz Tic Tac Encounter',
    date: 'November 14, 2004',
    location: 'Pacific Ocean, ~100 mi SW of San Diego',
    lat: 31.5, lng: -120.5,
    category: 'anomalous',
    strength: 5,
    spectrum: 92,
    summary: 'USS Princeton SPY-1 radar tracked approximately 100 craft over multiple days dropping from 80,000 feet to sea level in under a second — a fall rate inconsistent with any known aircraft, ballistic projectile, or known atmospheric phenomenon. F/A-18F Super Hornet pilots Cmdr. David Fravor and Lt. Cmdr. Alex Dietrich visually intercepted a 40-foot-long oblong matte-white craft (described by Fravor as "Tic Tac"-shaped with no visible wings, propulsion exhaust, control surfaces, or markings) hovering motionless above a patch of disturbed white water in the Pacific. The craft mirrored Fravor\'s descending intercept maneuver in real time, accelerated impossibly, and reappeared at the pre-briefed CAP point 60 nautical miles away in less than a minute — implying transit speeds in excess of Mach 5 with no sonic boom.',
    compelling: 'Multi-sensor convergence across independent platforms (Princeton SPY-1, F/A-18 onboard radar, ATFLIR thermal, direct visual). Four trained military observers. Sustained multi-day observation. Acceleration profile (~24,000 g implied) exceeds material limits of any known vehicle. No visible exhaust, no sonic boom at transonic transition, no control surfaces.',
    skeptics: 'Mick West and others argue the FLIR1 video shows parallax effects and that the lock-on point shifts indicate camera artifacts. They contend pilot recall years later may have inflated the observed maneuvers. AARO has investigated the case but has not publicly resolved it.',
    sources: [
      { label: 'NYT 2017 original reporting', url: 'https://www.nytimes.com/2017/12/16/us/politics/pentagon-program-ufo-harry-reid.html' },
      { label: 'DoD official FLIR1 release', url: 'https://www.aaro.mil/UAP-Cases/Official-UAP-Imagery/' },
      { label: 'Fravor Senate testimony 2023', url: 'https://oversight.house.gov/hearing/unidentified-anomalous-phenomena-implications-on-national-security-public-safety-and-government-transparency/' }
    ]
  },
  {
    id: 'belgian_wave_1989',
    title: 'Belgian UFO Wave',
    date: 'November 1989 – April 1990',
    location: 'Belgium (Eupen, Wallonia region)',
    lat: 50.63, lng: 6.03,
    category: 'anomalous',
    strength: 5,
    spectrum: 85,
    summary: 'Over 5 months, thousands of witnesses including hundreds of Belgian gendarmerie reported large silent black triangular craft with three or four bright white lights at the corners and a red pulsating light in the center, moving slowly at low altitudes across Belgium. The craft were typically described as ~30-40 meters per side, completely silent, capable of stationary hover and instantaneous acceleration. On the night of March 30-31, 1990, Belgian Air Force F-16s vectored by ground radar achieved multiple radar locks on craft that exhibited extreme acceleration — radar plots later analyzed showed transitions from Mach 0.7 to Mach 1.1 in seconds, with vertical descent from 7,000 to 1,700 meters in approximately 1 second (acceleration estimated at 40+ G, lethal to a human pilot). The craft repeatedly broke radar lock through evasive maneuvers no aircraft of the era could perform. Wing Commander (later Major General) Wilfried De Brouwer of the Belgian Air Force publicly confirmed the BAF could not identify the craft.',

  },
  {
    id: 'aguadilla_2013',
    title: 'Aguadilla Airport Incident',
    date: 'April 25, 2013',
    location: 'Rafael Hernández Airport, Puerto Rico',
    lat: 18.50, lng: -67.13,
    category: 'contested',
    strength: 3,
    spectrum: 45,
    summary: 'A U.S. Customs and Border Protection DHC-8 maritime patrol aircraft captured 3+ minutes of thermal infrared footage (WESCAM MX-15D sensor) of a small dark spherical or oblong craft, estimated 3-5 feet in diameter, traversing the Rafael Hernández Airport area at low altitude at night. The craft was tracked entering the Caribbean Sea, continuing under water for a measurable distance, then re-emerging and appearing to bi-locate (split into two identical objects flying in parallel). The Scientific Coalition for UAP Studies published a detailed 2015 analysis arguing the craft\'s observed flight characteristics — sustained subsonic transit through water without apparent cavitation, surface re-emergence with continued flight, and apparent fission into two objects — ruled out conventional explanations including drones, balloons, birds, and aircraft.',

    skeptics: 'In March 2025, AARO released a formal case-resolution report concluding with high confidence that the footage shows two small sky lanterns drifting at wind speed and direction. AARO\'s analysis attributed the apparent water-entry to parallax against the camera\'s viewing angle. Skeptical analysis by Rubén Lianza (Argentine CEFAe) reached similar conclusions earlier.',

  {

  {

    compelling: 'Largest documented mass-witness UAP event in German history. Multiple independent video recordings from different observer positions along ~50km of Baltic coastline. Includes recordings by visiting West German tourists (motivation against hoax). Recordings continued to be broadcast on German television for years after. Initially classified as "best documented German UAP case" by major UFO research organizations. Witness Steffen Pichollek had been sailing on the Greifswalder Bodden and observed the lights directly from sea level.',

    id: 'vietnam_dmz_1968',
    title: 'DMZ "Tonkin Gulf Lights" — HMAS Hobart Friendly Fire',

    category: 'contested',

    spectrum: 60,
    summary: 'On June 15-16, 1968, Allied forward spotters along the eastern Demilitarized Zone (DMZ) between North and South Vietnam reported observing approximately 30 slow-moving silent lights in the night sky. The lights were initially thought to be Soviet-built Mi-14 helicopters ferrying NVA personnel. The Royal Australian Navy destroyer HMAS Hobart (D 39) and USS Boston (CAG-1) were diverted to investigate. At 03:30 on June 17, while operating with radio silence and blacked-out conditions near Tiger Island, the Hobart\'s radar detected a "fast-approaching aircraft that registered as friendly" on IFF. Air-to-air missiles then struck the Hobart\'s starboard side, killing 2 sailors and wounding 7. The U.S. Navy inquiry officially attributed the attack to a USAF F-4 Phantom from Da Nang Air Base 366th Tactical Fighter Wing responding to the UFO reports. However, all 366th TFW F-4 pilots denied being over water with weapons released that night. The Australian crew described the attacking aircraft as triangular-configured, which an F-4 (swept-wing) is not. Earlier the same night, Swift Boat PCF-19 was sunk after its crew fired at the lights and reported their own fire being "returned." Major George Filer (USAF, 7th Air Force Intelligence I Corps analyst at the time) has publicly disputed the F-4 friendly fire conclusion.',

    skeptics: 'The U.S. Navy official inquiry concluded the Hobart was struck by AIM-7 Sparrow missiles fired by US F-4 Phantoms misidentifying the destroyer as enemy aircraft due to IFF failure during electronic countermeasure exercises in the area. This explanation has institutional support and is the official cause of death finding for the 2 sailors. The "30 slow-moving lights" likely included a combination of: (a) actual North Vietnamese Mi-14 helicopters with crude IFF, (b) tracer rounds and parachute flares from ongoing combat operations, (c) ARC LIGHT B-52 strikes illuminating high-altitude clouds, (d) atmospheric ducting of distant ship and aircraft lights. The Australian "triangular aircraft" description is single-source and could reflect imperfect night identification of a banking F-4 against a backdrop of flares and tracer fire. PCF-19\'s "returned fire" sinking may have been ordinary enemy mortar or rocket-propelled fire from shore.',
    sources: [

  {

    category: 'testimony',

    spectrum: 58,
    summary: 'At 01:52 on January 6, 1969, Tower 72 of the U.S. Army 23rd Infantry Division\'s Chu Lai Defense Command in Vietnam logged an entry in the official base journal reporting an unidentified craft. The journal entry, recovered from the U.S. National Archives by archivist Joe Gillette, states verbatim: "Twr 72 rpts object flying into their area about 700m infront [sic] of them, AZ 310°. Object came in slow over the ASP & landed. When object moves it has a glowing light. It is about 15 – 20 ft across. It is shaped like a big egg. Control twr rpts their radar did not pick anything up. Object also does not seem to have any sound to it when it moves." The craft was described as an egg-shaped, glowing 15-20 foot wide silent craft that landed inside Chu Lai Defense Sector — a heavily fortified U.S. base — and produced no radar return.',

    title: 'Kalahari "UFO Crash" — Van Greunen Hoax',

    summary: 'In 1990, "Captain James Van Greunen" of the South African Air Force contacted British UFO researcher Tony Dodd (Quest International) with a detailed dossier claiming that on May 7, 1989, a disc-shaped craft 18 meters in diameter had entered South African airspace at 5,746 mph, been intercepted by Mirage F1 fighters from Valhalla AFB armed with experimental "Thor 2 laser cannons," shot down, and crashed in the Kalahari Desert ~80km from the Botswana border. The dossier described recovery of 2-3 humanoid occupants with internal organs unlike humans (no liver/kidneys/stomach, chlorophyll-like substance, multiple unidentified arteries). Operation "Silver Diamond" allegedly transferred wreckage and bodies to the US at Wright-Patterson AFB in exchange for advanced weapons. Tony Dodd publicly compared the case to Roswell. Documents included photographs, technical schematics, and operational orders.',
    compelling: 'Initially the case appeared well-documented with apparent official military stationery, named officers, specific dates and locations, technical detail consistent with the period (Mirage fighters and South African nuclear/defense program), and corroboration from Botswana Environment Minister Dithoko Seiso. The level of technical detail suggested either authentic insider knowledge or extraordinarily sophisticated fabrication. Quest International magazine devoted a special edition (May/June 1993) to the case. Multiple secondary sources picked up the story and ran with it. The named base (Valhalla AFB) actually exists, and Mirage fighters were in SAAF inventory at the time.',

  {
    id: 'salta_1995',

    category: 'contested',

    spectrum: 60,
    summary: 'At approximately 13:50 on August 17, 1995, dozens of witnesses across Joaquín V. González and surrounding communities in Anta Department, Salta, observed a bright metallic disc-shaped craft estimated at 200 meters across, with a silver reflective surface and no visible exhaust, control surfaces, or sound, screaming out of the cloudless sky at high speed. Multiple witnesses reported that two smaller dark elongated craft (described variously as "missiles" or "triangular aircraft") impacted the silver disc. The disc began to fail, fell to the ground, and produced a powerful explosion followed by seismic activity felt up to 320 km away. Primary witness Antonio "Tony" Galvagno, an experienced civilian crop-duster aviator, immediately took off in his Flystar two-seat aircraft to investigate. He could not penetrate the dense black smoke containing visible metallic particles. Two days later, aerial reconnaissance revealed a 5 km long × 500-600 m wide impact burn scar on the ground at Serranía Colorada, with trees torn from the soil and scorched. A rescue team led by a man named Olivera reported finding a metallic craft on Cerro El Crestón before being ordered to withdraw. Galvagno was subsequently confronted by Gendarmería Nacional personnel and told to cease investigation; armed personnel in unmarked black 4WD vehicles arrived. Vegetation reportedly never regrew in the impact area.',
    compelling: 'Multiple independent witness communities (Cerrillo, La Merced, El Carril, Joaquín V. González) reporting the same time, smoke column, and ground tremor. A named civilian aviator (Antonio Galvagno) with verifiable Flystar aircraft conducted in-person investigation flights and ground surveys. Physical persistent burn scar 5 km × 500 m visible from the air and ground for years afterward. Reported seismic detection 320 km away. Argentine national media coverage including programs by Susana Giménez and Jorge Guinzburg. Argentine Gendarmería Nacional and Air Force formally cordoned off the area and invoked "national security" reasons. The pattern (silver craft + smaller projectile attack + crash + military cordon + civilian researcher harassment) is consistent across multiple unrelated witness statements. Saltan journalist Raúl Córdoba (Crónica newspaper, Sept 1, 1995) reported the presence of "NASA personnel" and University of Salta involvement.',

const map = L.map('map', {
  center: [25, -10],
  zoom: 2,
  minZoom: 2,
  maxZoom: 12,
  worldCopyJump: true,
  zoomControl: true
});

L.control.zoom({ position: 'bottomright' }).addTo(map);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution: '&copy; OpenStreetMap',
  maxZoom: 18
}).addTo(map);

// ============================================================
// PINS
// ============================================================
const cluster = L.markerClusterGroup({
  maxClusterRadius: 40,
  spiderfyOnMaxZoom: true,
  showCoverageOnHover: false
});

const activeCategories = new Set(Object.keys(CATEGORIES));

function createPin(caseData) {
  const cat = CATEGORIES[caseData.category];
  const color = cat.color;
  // Size scales with evidence strength: 14px at strength 1, 32px at strength 5
  const size = 12 + (caseData.strength * 4);
  const isStrong = caseData.strength >= 4;

  const html = `<div class="uap-pin ${isStrong ? 'strong pulse' : ''}"
    style="width:${size}px; height:${size}px; background:${color}; color:${color};"></div>`;

  const icon = L.divIcon({
    html,
    className: 'uap-pin-wrapper',
    iconSize: [size, size],
    iconAnchor: [size/2, size/2]
  });

  const marker = L.marker([caseData.lat, caseData.lng], { icon });
  marker.caseData = caseData;
  marker.on('click', () => openModal(caseData));
  return marker;
}

const markers = CASES.map(c => createPin(c));
markers.forEach(m => cluster.addLayer(m));
map.addLayer(cluster);

// ============================================================
// LEGEND
// ============================================================
const legendEl = document.getElementById('legend');
Object.entries(CATEGORIES).forEach(([key, cat]) => {
  const item = document.createElement('div');
  item.className = 'legend-item';
  item.dataset.cat = key;
  item.innerHTML = `<div class="legend-dot" style="background:${cat.color}"></div>
    <div class="legend-label">${cat.label}</div>`;
  item.addEventListener('click', () => toggleCategory(key, item));
  legendEl.appendChild(item);
});

function toggleCategory(key, el) {
  if (activeCategories.has(key)) {
    activeCategories.delete(key);
    el.classList.add('disabled');
  } else {
    activeCategories.add(key);
    el.classList.remove('disabled');
  }
  // Re-add markers based on active categories
  cluster.clearLayers();
  markers.forEach(m => {
    if (activeCategories.has(m.caseData.category)) {
      cluster.addLayer(m);
    }
  });
}

const backdrop = document.getElementById('modalBackdrop');
const modal = document.getElementById('modal');

  const cat = CATEGORIES[c.category];
  document.getElementById('modalTitle').textContent = c.title;
  document.getElementById('modalMeta').textContent = `${c.date} · ${c.location}`;
  document.getElementById('modalCategoryDot').style.background = cat.color;
  document.getElementById('modalCategoryLabel').textContent = cat.label;
  document.getElementById('modalSummary').textContent = c.summary;
  document.getElementById('modalCompelling').textContent = c.compelling;
  document.getElementById('modalSkeptics').textContent = c.skeptics;

  const pos = c.spectrum != null ? c.spectrum : cat.position;
  document.getElementById('modalSpectrumMarker').style.left = pos + '%';
  document.getElementById('modalSpectrumMarker').style.background = cat.color;

  const sourcesEl = document.getElementById('modalSources');
  sourcesEl.innerHTML = '';
  c.sources.forEach(s => {
    const a = document.createElement('a');
    a.href = s.url;
    a.target = '_blank';
    a.rel = 'noopener';
    a.textContent = s.label + ' →';
    sourcesEl.appendChild(a);
  });

  backdrop.classList.add('open');
}

function closeModal() {
  backdrop.classList.remove('open');
}

document.getElementById('modalClose').addEventListener('click', closeModal);
backdrop.addEventListener('click', (e) => {
  if (e.target === backdrop) closeModal();
});
document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') closeModal();
});
</script>

</body>
</html>
